version: 2
models:
  - name: raw_aircrafts
    columns:
      - name: aircraft_code
        description: Трехсимвольный код модели самолета.
        data_type: character
      - name: model
        description: Полное наименование модели самолета (на английском).
        data_type: text
      - name: range
        description: Максимальная дальность полета в километрах.
        data_type: integer
      - name: record_source
        description: >-
          The record_source column in the "dwh_flight"."flights"."raw_aircrafts" table contains the source
          system or platform from which the data was collected, such as "source.dbt_stepik.demo_src.aircrafts".
        data_type: text
      - name: load_datetime
        description: >-
          The load_datetime column represents the timestamp of when the aircraft data was collected.
        data_type: timestamp with time zone
    description: >-
      A table containing raw data for aircraft models, sourced directly from the source.dbt_stepik.demo_src.aircrafts
      model.
