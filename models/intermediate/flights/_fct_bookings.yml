models:
  - name: fct_bookings
    description: >-
      The `fct_bookings` table in the `dwh_flight`.`flights_intermediate` schema contains booking records
      with columns for unique booking reference, booking date and time, and total booking amount.
    tests:
      - elementary.all_columns_anomalies:
          # timestamp_column: loaded_at
          column_anomalies: [null_count, missing_count, zero_count]
    columns:
      - name: book_ref
        description: Уникальный код бронирования (6 символов).
        data_type: character
        constraints:
          - type: not_null
            warn_unenforced: true
            warn_unsupported: false
            to_columns: []
      - name: book_date
        description: Дата и время оформления бронирования (timestamp with time zone).
        data_type: timestamp with time zone
      - name: total_amount
        description: Общая стоимость бронирования (numeric).
        data_type: numeric
        constraints:
          - type: check
            expression: total_amount > 0
            warn_unenforced: true
            warn_unsupported: false
            to_columns: []

    # config:
    latest_version: 2
    docs:
      show: true
      node_color: red
    deprecation_date: 2200-01-01 00:00
    access: public
    config:
      contract: { enforced: true }
    meta:
      owner: my_email@gmail.com
      tg: my_tg

    # versions:
    versions:
      - v: 2
        defined_in: fct_bookings_v2
        columns:
          - include: "all"
          - name: loaded_at
            data_type: date
            description: Дата загрузки данных.

      - v: 1
        defined_in: fct_bookings
        deprecation_date: 2026-12-31
        columns:
          - include: "all"
