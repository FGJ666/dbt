version: 2
models:
  - name: fct_flights
    description: >-
      Факт-таблица рейсов, содержащая информацию о каждом рейсе, включая запланированные и фактические
      времена вылета и прилета, а также статусы рейсов.

    data_tests:
      - dbt_utils.equal_rowcount:
          arguments:
            compare_model: ref('stg_flights__flights')

    columns:
      - name: flight_id
        description: Уникальный идентификатор рейса
        data_type: integer
      - name: flight_no
        description: Номер рейса (код авиакомпании + номер)
        data_type: character
      - name: scheduled_departure
        description: Запланированное время вылета
        data_type: timestamp with time zone
      - name: scheduled_arrival
        description: Запланированное время прилета
        data_type: timestamp with time zone
      - name: departure_airport
        description: Код аэропорта вылета
        data_type: character
      - name: arrival_airport
        description: Код аэропорта прилета
        data_type: character
      - name: status
        description: Статус рейса (запланирован, вылетел, прилетел и т.д.)
        data_type: character varying
      - name: aircraft_code
        description: Код типа воздушного судна
        data_type: character
      - name: actual_departure
        description: Фактическое время вылета
        data_type: timestamp with time zone
      - name: actual_arrival
        description: Фактическое время прилета
        data_type: timestamp with time zone
      - name: actual_duration_flight
        description: Фактическое время полета
        data_type: interval
      - name: load_date
        data_type: date
        description:
          Дата загрузки данных в таблицу, указывающая на момент, когда строки были
          добавлены.
unit_tests:
  # Оба поля заданы
  - name: arrival_greater_than_departure
    description: Если actual_arrival > actual_departure, то duration = их разность
    model: fct_flights
    given:
      - input: ref('stg_flights__flights')
        rows:
          - {
              actual_departure: "2017-07-07 06:00:00+00",
              actual_arrival: "2017-07-07 07:00:00+00",
            }
    expect:
      rows:
        - { actual_duration_flight: 01:00:00 }

    # actual_arrival null
  - name: actual_arrival_is_null
    description: Если actual_arrival is null, то duration = INTERVAL '0 seconds'
    model: fct_flights

    given:
      - input: ref('stg_flights__flights')
        rows:
          - { actual_departure: "2017-07-07 06:00:00+00", actual_arrival: null }
    expect:
      rows:
        - { actual_duration_flight: 00:00:00 }

  # actual_departure null
  - name: actual_departure_is_null
    description: Если actual_departure is null, то duration = INTERVAL '0 seconds'
    model: fct_flights
    given:
      - input: ref('stg_flights__flights')
        rows:
          - { actual_departure: null, actual_arrival: "2017-07-07 07:00:00+00" }
    expect:
      rows:
        - { actual_duration_flight: 00:00:00 }
